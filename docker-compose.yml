version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      args:
        - APP=api
    container_name: cutomerrag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - apps/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  s3-ingestion:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      args:
        - APP=s3_ingestion
    container_name: cutomerrag-s3-ingestion
    restart: unless-stopped
    env_file:
      - apps/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chunk-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      args:
        - APP=chunk_worker
    container_name: cutomerrag-chunk-worker
    restart: unless-stopped
    env_file:
      - apps/.env
    environment:
      - CHUNK_WORKER_MODE=both
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  embedding-sync-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      args:
        - APP=embedding_sync_worker
    container_name: cutomerrag-embedding-sync-worker
    restart: unless-stopped
    env_file:
      - apps/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ragas-eval-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      args:
        - APP=ragas_eval_worker
    container_name: cutomerrag-ragas-eval-worker
    restart: unless-stopped
    env_file:
      - apps/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
