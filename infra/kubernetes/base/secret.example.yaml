# Copy to overlays/prod/secrets.yaml (gitignored) or create via:
#   kubectl create secret generic cutomerrag-secrets -n cutomerrag \
#     --from-literal=JWT_SECRET_KEY=... \
#     --from-literal=AWS_ACCESS_KEY_ID=... \
#     ...
#
# Never commit real secret values.
apiVersion: v1
kind: Secret
metadata:
  name: cutomerrag-secrets
  namespace: cutomerrag
  labels:
    app.kubernetes.io/part-of: cutomerrag
type: Opaque
stringData:
  JWT_SECRET_KEY: "replace-me"
  AWS_ACCESS_KEY_ID: "replace-me"
  AWS_SECRET_ACCESS_KEY: "replace-me"
  AWS_SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/123456789012/rag-ingestion"
  GOOGLE_API_KEY: "replace-me"
  GEMINI_API_KEY: "replace-me"
  COHERE_API_KEY: "replace-me"
  LANDING_AI_API_KEY: "replace-me"
  QDRANT_API_KEY: ""
