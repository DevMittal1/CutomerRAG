apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-ingestion
  namespace: cutomerrag
  labels:
    app.kubernetes.io/name: s3-ingestion
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: cutomerrag
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: s3-ingestion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: s3-ingestion
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: cutomerrag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: s3-ingestion
          image: ghcr.io/devmittal1/cutomerrag-s3-ingestion:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: cutomerrag-config
            - secretRef:
                name: cutomerrag-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
