apiVersion: v1
kind: ConfigMap
metadata:
  name: cutomerrag-config
  namespace: cutomerrag
  labels:
    app.kubernetes.io/part-of: cutomerrag
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  ENV: "production"
  MONGODB_DB_NAME: "rag_prod"
  REDIS_CHUNK_STREAM: "rag:chunks"
  AWS_REGION: "us-east-1"
  # Override these in overlays or via external secrets for your environment.
  MONGODB_URI: "mongodb://mongodb.data.svc.cluster.local:27017"
  REDIS_URI: "redis://redis.data.svc.cluster.local:6379"
  QDRANT_URL: "http://qdrant.data.svc.cluster.local:6333"
  QDRANT_COLLECTION_NAME: "document_chunks"
  QDRANT_VECTOR_SIZE: "512"
  QDRANT_DISTANCE: "Cosine"
  S3_BUCKET_NAME: "rag-prod-documents-bucket"
  CORS_ORIGINS: '["https://app.example.com"]'
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  GEMINI_EMBEDDING_MODEL: "models/gemini-embedding-2"
  LANDING_AI_BASE_URL: "https://api.va.landing.ai/v1/ade"
