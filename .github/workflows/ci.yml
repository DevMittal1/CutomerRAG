name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cutomerrag

jobs:
  validate-kubernetes:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Kustomize build (base)
        run: kubectl kustomize infra/kubernetes/base

      - name: Kustomize build (prod overlay)
        run: kubectl kustomize infra/kubernetes/overlays/prod

  docker-build:
    name: Docker build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - api
          - s3_ingestion
          - chunk_worker
          - embedding_sync_worker
          - embedding_sync_worker
          - ragas_eval_worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          build-args: APP=${{ matrix.app }}
          push: false
          tags: test-${{ matrix.app }}:ci
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  makefile-check:
    name: Makefile targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ci-validate
        run: make ci-validate
