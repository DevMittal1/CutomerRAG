name: Publish container images

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: git SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cutomerrag

jobs:
  build-and-push:
    name: Push ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - api
          - s3_ingestion
          - local_chunk_worker
          - external_chunk_worker
          - embedding_sync_worker
          - ragas_eval_worker
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: meta
        run: |
          APP="${{ matrix.app }}"
          SUFFIX="${APP//_/-}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/cutomerrag-${SUFFIX}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          build-args: APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "value=${{ inputs.tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_DATA != ''
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Patch image tags and apply
        if: secrets.KUBE_CONFIG_DATA != ''
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          RAW_OWNER="${{ github.repository_owner }}"
          OWNER="${RAW_OWNER,,}"
          OVERLAY=infra/kubernetes/overlays/prod
          cd "$OVERLAY"
          kustomize edit set image \
            "ghcr.io/${OWNER}/cutomerrag-api=ghcr.io/${OWNER}/cutomerrag-api:${TAG}" \
            "ghcr.io/${OWNER}/cutomerrag-s3-ingestion=ghcr.io/${OWNER}/cutomerrag-s3-ingestion:${TAG}" \
            "ghcr.io/${OWNER}/cutomerrag-local-chunk-worker=ghcr.io/${OWNER}/cutomerrag-local-chunk-worker:${TAG}" \
            "ghcr.io/${OWNER}/cutomerrag-external-chunk-worker=ghcr.io/${OWNER}/cutomerrag-external-chunk-worker:${TAG}" \
            "ghcr.io/${OWNER}/cutomerrag-embedding-sync-worker=ghcr.io/${OWNER}/cutomerrag-embedding-sync-worker:${TAG}" \
            "ghcr.io/${OWNER}/cutomerrag-ragas-eval-worker=ghcr.io/${OWNER}/cutomerrag-ragas-eval-worker:${TAG}"
          kubectl apply -k .

      - name: Skip deploy (no cluster secret)
        if: secrets.KUBE_CONFIG_DATA == ''
        run: echo "KUBE_CONFIG_DATA not set — images published to GHCR only."
